name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version being published (e.g. 1.0.4)'
        required: true

jobs:
  publish:
    name: Pack, Sign, and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack pack/template-pack.csproj -c Release -o ./release-artifacts

      - name: Install sign CLI
        if: env.SIGNING_ACCOUNT != ''
        env:
          SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
        run: dotnet tool install -g sign --prerelease

      - name: Sign NuGet package with Azure Trusted Signing
        if: env.SIGNING_ACCOUNT != ''
        env:
          SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
        run: |
          sign code trusted-signing release-artifacts/*.nupkg \
            --trusted-signing-endpoint "${{ secrets.TRUSTED_SIGNING_ENDPOINT }}" \
            --trusted-signing-account "${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}" \
            --trusted-signing-certificate-profile "${{ secrets.TRUSTED_SIGNING_CERT_PROFILE }}" \
            --azure-tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --azure-client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --azure-client-secret "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --timestamp-url http://timestamp.acs.microsoft.com

      - name: Push to NuGet
        run: |
          dotnet nuget push "release-artifacts/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nupkg
          path: release-artifacts/*.nupkg
